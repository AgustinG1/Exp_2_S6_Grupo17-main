name: Deploy Spring Boot App

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar Java (JDK 21)
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Compilar el proyecto con Maven
        run: mvn clean package -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/guias-despacho:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/guias-despacho:latest

      - name: Deploy to EC2 via Native SSH
        env:
          PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          HOST: ${{ secrets.EC2_HOST }}
          # CAMBIO CRÍTICO: Usualmente en AWS Academy el usuario es ec2-user
          USER: ubuntu 
        run: |
          # 1. Configurar la carpeta y limpiar la llave SSH
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          
          # Escribir la llave asegurando los saltos de línea correctos
          echo "$PRIVATE_KEY" | sed 's/\r$//' > ~/.ssh/id_rsa
          echo "" >> ~/.ssh/id_rsa
          
          chmod 600 ~/.ssh/id_rsa
          
          # Agregar el host a known_hosts
          ssh-keyscan -H $HOST >> ~/.ssh/known_hosts
          
          # 2. Conectarse y ejecutar los comandos de Docker
          ssh -o StrictHostKeyChecking=no -o PubkeyAcceptedKeyTypes=+ssh-rsa -i ~/.ssh/id_rsa $USER@$HOST << 'EOF'
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/guias-despacho:latest
            
            docker stop guias-app || true
            docker rm guias-app || true
            
            docker run -d --name guias-app -p 8080:8080 \
              -e AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
              -e AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
              -e AWS_SESSION_TOKEN="${{ secrets.AWS_SESSION_TOKEN }}" \
              -e AWS_REGION="${{ secrets.AWS_REGION }}" \
              -e AWS_S3_BUCKET_NAME="${{ secrets.AWS_S3_BUCKET_NAME }}" \
              -e AZURE_ISSUER_URI="${{ secrets.AZURE_ISSUER_URI }}" \
              -e CLIENT_ID="${{ secrets.CLIENT_ID }}" \
              ${{ secrets.DOCKERHUB_USERNAME }}/guias-despacho:latest
              
            echo "✅ Deploy completado en EC2"
          EOF
