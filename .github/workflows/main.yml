name: Deploy Spring Boot App

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar Java (JDK 21)
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Compilar el proyecto con Maven
        run: mvn clean package -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/guias-despacho:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/guias-despacho:latest

      - name: Configure SSH Key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          sed -i 's/\r$//' ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keygen -y -f ~/.ssh/id_rsa > /dev/null 2>&1 && echo "Key is valid" || echo "Key is INVALID"

      - name: Add EC2 to known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        env:
          DOCKER_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          EC2_USER: ${{ secrets.USER_SERVER }}
          EC2_IP: ${{ secrets.EC2_HOST }}
          AWS_KEY: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          AWS_REG: ${{ secrets.AWS_REGION }}
          S3_BUCKET: ${{ secrets.AWS_S3_BUCKET_NAME }}
          ISSUER: ${{ secrets.AZURE_ISSUER_URI }}
          CID: ${{ secrets.CLIENT_ID }}
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa ${EC2_USER}@${EC2_IP} "
            docker pull ${DOCKER_USER}/guias-despacho:latest
            docker stop guias-app || true
            docker rm guias-app || true
            docker run -d --name guias-app -p 8080:8080 \
              -e AWS_ACCESS_KEY_ID='${AWS_KEY}' \
              -e AWS_SECRET_ACCESS_KEY='${AWS_SECRET}' \
              -e AWS_SESSION_TOKEN='${AWS_TOKEN}' \
              -e AWS_REGION='${AWS_REG}' \
              -e AWS_S3_BUCKET_NAME='${S3_BUCKET}' \
              -e AZURE_ISSUER_URI='${ISSUER}' \
              -e CLIENT_ID='${CID}' \
              ${DOCKER_USER}/guias-despacho:latest
          "

