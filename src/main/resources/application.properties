spring.application.name=ms-administracion-archivos
server.port=8080

# Azure AD B2C
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://grupo17guia.b2clogin.com/grupo17guia.onmicrosoft.com/B2C_1_signupsignin/discovery/v2.0/keys?p=B2C_1_signupsignin
spring.security.oauth2.client.registration.azure.client-id=${CLIENT_ID}

# AWS S3
aws.s3.bucket.name=${AWS_S3_BUCKET_NAME}

# Configuracion para logs de AWS
logging.level.software.amazon.awssdk=DEBUG
logging.level.io.awspring.cloud=DEBUG

# Configuracion EFS
efs.path=${EFS_PATH:/app/efs}

# --- CONFIGURACIÓN RABBITMQ ---
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Nombre de la cola que vamos a crear
guia.rabbitmq.queue=guias.despacho.queue
